name: Docker Build and Push

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - '.github/build/version.txt'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/v2bx

jobs:
  build-amd64:
    runs-on: [self-hosted, Linux, X64]
    env:
      http_proxy: ""
      https_proxy: ""
      no_proxy: ""
      LOCAL_CACHE_DIR: ${{ github.workspace }}/_tmp/.buildx-cache-v2bx-amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false
          fetch-depth: 1
          submodules: false
          path: src

      - name: Read version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(tr -d '\r\n\t ' < src/.github/build/version.txt)"
          if [ -z "$VERSION" ]; then
            echo "version.txt is empty" >&2
            exit 1
          fi
          if [[ "$VERSION" == v* ]]; then
            TAG="$VERSION"
          else
            TAG="v$VERSION"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=-amd64
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}
            type=ref,event=branch
            type=sha

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare local buildx cache dir
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${LOCAL_CACHE_DIR}"
          rm -rf "${LOCAL_CACHE_DIR}-new"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./src
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=${{ env.LOCAL_CACHE_DIR }}
          cache-to: type=local,dest=${{ env.LOCAL_CACHE_DIR }}-new,mode=min

      - name: Rotate local buildx cache
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "${LOCAL_CACHE_DIR}-new" ]; then
            rm -rf "${LOCAL_CACHE_DIR}"
            mv "${LOCAL_CACHE_DIR}-new" "${LOCAL_CACHE_DIR}"
          fi

      - name: Cleanup old workspace temp
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          find "${GITHUB_WORKSPACE}/_tmp" -mindepth 1 -maxdepth 1 -type d -mtime +7 -exec rm -rf {} +

  build-arm64:
    runs-on: [self-hosted, Linux, ARM64]
    env:
      http_proxy: ""
      https_proxy: ""
      no_proxy: ""
      LOCAL_CACHE_DIR: ${{ github.workspace }}/_tmp/.buildx-cache-v2bx-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false
          fetch-depth: 1
          submodules: false
          path: src

      - name: Read version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(tr -d '\r\n\t ' < src/.github/build/version.txt)"
          if [ -z "$VERSION" ]; then
            echo "version.txt is empty" >&2
            exit 1
          fi
          if [[ "$VERSION" == v* ]]; then
            TAG="$VERSION"
          else
            TAG="v$VERSION"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=-arm64
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}
            type=ref,event=branch
            type=sha

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare local buildx cache dir
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${LOCAL_CACHE_DIR}"
          rm -rf "${LOCAL_CACHE_DIR}-new"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./src
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=${{ env.LOCAL_CACHE_DIR }}
          cache-to: type=local,dest=${{ env.LOCAL_CACHE_DIR }}-new,mode=min

      - name: Rotate local buildx cache
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "${LOCAL_CACHE_DIR}-new" ]; then
            rm -rf "${LOCAL_CACHE_DIR}"
            mv "${LOCAL_CACHE_DIR}-new" "${LOCAL_CACHE_DIR}"
          fi

      - name: Cleanup old workspace temp
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          find "${GITHUB_WORKSPACE}/_tmp" -mindepth 1 -maxdepth 1 -type d -mtime +7 -exec rm -rf {} +

  merge-manifest:
    needs: [build-amd64, build-arm64]
    runs-on: [self-hosted, Linux, X64]
    env:
      http_proxy: ""
      https_proxy: ""
      no_proxy: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false
          fetch-depth: 1
          submodules: false
          path: src

      - name: Read version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(tr -d '\r\n\t ' < src/.github/build/version.txt)"
          if [ -z "$VERSION" ]; then
            echo "version.txt is empty" >&2
            exit 1
          fi
          if [[ "$VERSION" == v* ]]; then
            TAG="$VERSION"
          else
            TAG="v$VERSION"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}
            type=ref,event=branch
            type=sha

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifests
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            docker buildx imagetools create \
              -t "$tag" \
              "${tag}-amd64" \
              "${tag}-arm64"
            echo "Created manifest: $tag"
          done <<< "${{ steps.meta.outputs.tags }}"
