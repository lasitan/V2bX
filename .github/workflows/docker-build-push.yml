name: Docker Build and Push

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/build/version.txt'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/v2bx

jobs:
  prepare:
    runs-on: [self-hosted, Linux, X64]
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    env:
      http_proxy: ""
      https_proxy: ""
      no_proxy: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false
          fetch-depth: 1
          submodules: false
          path: src

      - name: Read version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(tr -d '\r\n\t ' < src/.github/build/version.txt)"
          if [ -z "$VERSION" ]; then
            echo "version.txt is empty" >&2
            exit 1
          fi
          if [[ "$VERSION" == v* ]]; then
            TAG="$VERSION"
          else
            TAG="v$VERSION"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build-amd64:
    runs-on: [self-hosted, Linux, X64]
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false
          fetch-depth: 1
          submodules: false
          path: src

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push amd64 image
        uses: docker/build-push-action@v6
        with:
          context: ./src
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.tag }}-amd64

  build-arm64:
    runs-on: [self-hosted, Linux, ARM64]
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false
          fetch-depth: 1
          submodules: false
          path: src

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arm64 image
        uses: docker/build-push-action@v6
        with:
          context: ./src
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.tag }}-arm64

  release:
    runs-on: [self-hosted, Linux, X64]
    needs: [prepare, build-amd64, build-arm64]
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        shell: bash
        run: |
          set -euo pipefail
          BASE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          TAG="${{ needs.prepare.outputs.tag }}"
          docker buildx imagetools create \
            -t "${BASE}:${TAG}" \
            "${BASE}:${TAG}-amd64" \
            "${BASE}:${TAG}-arm64"
