name: Build, Package and Release

on:
  push:
    branches:
      - main
      - master
    paths:
      - '.github/build/version.txt'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # 在对应原生架构 runner 上构建，避免全部堆在一台机器。请按需修改 runs-on 为你的自托管标签。
  build-x86:
    runs-on: [self-hosted, Linux, X64]
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    env:
      GOMODCACHE: ${{ github.workspace }}/_tmp/v2bx-go-cache/${{ github.run_id }}/mod
      GOCACHE: ${{ github.workspace }}/_tmp/v2bx-go-cache/${{ github.run_id }}/build
      GOTMPDIR: ${{ github.workspace }}/_tmp/v2bx-go-cache/${{ github.run_id }}/tmp
    defaults:
      run:
        working-directory: checkout
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: false
          submodules: false
          path: checkout

      - name: Fix repository ownership
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if command -v sudo >/dev/null 2>&1; then
            sudo chown -R "$(id -u):$(id -g)" "${GITHUB_WORKSPACE}/checkout" || true
          fi

      - name: Init Go cache dirs
        run: |
          set -euo pipefail
          mkdir -p "$GOMODCACHE" "$GOCACHE" "$GOTMPDIR"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: checkout/go.mod
          cache: true

      - name: Read version
        id: version
        run: |
          set -euo pipefail
          VERSION_RAW="$(tr -d '\r\n\t ' < .github/build/version.txt)"
          [ -n "$VERSION_RAW" ] || { echo "version.txt is empty" >&2; exit 1; }
          if [[ "$VERSION_RAW" == v* ]]; then TAG="$VERSION_RAW"; else TAG="v$VERSION_RAW"; fi
          echo "version=$VERSION_RAW" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Clean stale dist
        run: |
          set -euo pipefail
          rm -rf dist/

      - name: Build all targets (x86 family)
        env:
          VERSION: ${{ steps.version.outputs.version }}
          RUNNER_FAMILY: x86
        run: |
          set -euo pipefail
          mkdir -p dist/binaries dist/archives
          mkdir -p dist/package
          json_file='.github/build/friendly-filenames.json'
          for key in $(jq -r --arg fam "$RUNNER_FAMILY" 'to_entries[] | select(.value.runnerFamily==$fam) | .key' "$json_file" | sort); do
            friendly=$(jq -r --arg k "$key" '.[$k].friendlyName' "$json_file")
            os="${key%%-*}"
            arch_variant="${key#*-}"
            GOOS="$os"
            GOARCH="$arch_variant"
            unset GOARM || true
            unset GOMIPS || true
            case "$arch_variant" in
              arm5) GOARCH=arm; GOARM=5 ;;
              arm6) GOARCH=arm; GOARM=6 ;;
              arm7) GOARCH=arm; GOARM=7 ;;
              mipssoftfloat) GOARCH=mips; GOMIPS=softfloat ;;
              mipslesoftfloat) GOARCH=mipsle; GOMIPS=softfloat ;;
            esac
            ext=""
            if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
            out_name="V2bX-${friendly}${ext}"
            out_path="dist/binaries/${out_name}"
            echo "Building ${key} -> ${out_name}"
            env_vars=("GOOS=$GOOS" "GOARCH=$GOARCH" "CGO_ENABLED=0")
            if [ -n "${GOARM:-}" ]; then env_vars+=("GOARM=$GOARM"); fi
            if [ -n "${GOMIPS:-}" ]; then env_vars+=("GOMIPS=$GOMIPS"); fi
            build_tags="sing hysteria2 with_quic with_grpc with_utls with_acme"
            if [ "$GOOS" = "linux" ]; then
              build_tags="$build_tags xray with_wireguard with_gvisor"
            fi
            env "${env_vars[@]}" go build -trimpath -tags "$build_tags" \
              -ldflags "-s -w -X github.com/InazumaV/V2bX/cmd.version=${VERSION}" -o "$out_path" .
            pkg_dir="dist/package/${friendly}"
            rm -rf "$pkg_dir"
            mkdir -p "$pkg_dir"
            pkg_bin_name="V2bX${ext}"
            cp "$out_path" "$pkg_dir/$pkg_bin_name"
            if [ -d "example" ]; then
              cp -a "example/." "$pkg_dir/"
            fi
            if [ "$GOOS" = "windows" ]; then
              (cd "$pkg_dir" && zip -q -9 "../../archives/${out_name}.zip" ./*)
            else
              tar -C "$pkg_dir" -czf "dist/archives/${out_name}.tar.gz" .
            fi
          done

      - name: Restore ownership
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          if command -v sudo >/dev/null 2>&1; then
            sudo chown -R "$(id -u):$(id -g)" "${GITHUB_WORKSPACE}/checkout" || true
          fi

      - name: Cleanup per-run Go temp dirs
        if: always()
        working-directory: ${{ github.workspace }}
        run: rm -rf "_tmp/v2bx-go-cache/${GITHUB_RUN_ID}"

      - uses: actions/upload-artifact@v4
        with:
          name: release-x86
          path: checkout/dist/archives/
          if-no-files-found: error

  build-arm:
    runs-on: [self-hosted, Linux, ARM64]
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    env:
      GOMODCACHE: ${{ github.workspace }}/_tmp/v2bx-go-cache/${{ github.run_id }}/mod
      GOCACHE: ${{ github.workspace }}/_tmp/v2bx-go-cache/${{ github.run_id }}/build
      GOTMPDIR: ${{ github.workspace }}/_tmp/v2bx-go-cache/${{ github.run_id }}/tmp
    defaults:
      run:
        working-directory: checkout
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: false
          submodules: false
          path: checkout

      - name: Fix repository ownership
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          if command -v sudo >/dev/null 2>&1; then
            sudo chown -R "$(id -u):$(id -g)" "${GITHUB_WORKSPACE}/checkout" || true
          fi

      - name: Init Go cache dirs
        run: |
          set -euo pipefail
          mkdir -p "$GOMODCACHE" "$GOCACHE" "$GOTMPDIR"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: checkout/go.mod
          cache: true

      - name: Read version
        id: version
        run: |
          set -euo pipefail
          VERSION_RAW="$(tr -d '\r\n\t ' < .github/build/version.txt)"
          [ -n "$VERSION_RAW" ] || { echo "version.txt is empty" >&2; exit 1; }
          if [[ "$VERSION_RAW" == v* ]]; then TAG="$VERSION_RAW"; else TAG="v$VERSION_RAW"; fi
          echo "version=$VERSION_RAW" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Clean stale dist
        run: |
          set -euo pipefail
          rm -rf dist/

      - name: Build all targets (ARM family)
        env:
          VERSION: ${{ steps.version.outputs.version }}
          RUNNER_FAMILY: arm
        run: |
          set -euo pipefail
          mkdir -p dist/binaries dist/archives
          mkdir -p dist/package
          json_file='.github/build/friendly-filenames.json'
          for key in $(jq -r --arg fam "$RUNNER_FAMILY" 'to_entries[] | select(.value.runnerFamily==$fam) | .key' "$json_file" | sort); do
            friendly=$(jq -r --arg k "$key" '.[$k].friendlyName' "$json_file")
            os="${key%%-*}"
            arch_variant="${key#*-}"
            GOOS="$os"
            GOARCH="$arch_variant"
            unset GOARM || true
            unset GOMIPS || true
            case "$arch_variant" in
              arm5) GOARCH=arm; GOARM=5 ;;
              arm6) GOARCH=arm; GOARM=6 ;;
              arm7) GOARCH=arm; GOARM=7 ;;
              mipssoftfloat) GOARCH=mips; GOMIPS=softfloat ;;
              mipslesoftfloat) GOARCH=mipsle; GOMIPS=softfloat ;;
            esac
            ext=""
            if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
            out_name="V2bX-${friendly}${ext}"
            out_path="dist/binaries/${out_name}"
            echo "Building ${key} -> ${out_name}"
            env_vars=("GOOS=$GOOS" "GOARCH=$GOARCH" "CGO_ENABLED=0")
            if [ -n "${GOARM:-}" ]; then env_vars+=("GOARM=$GOARM"); fi
            if [ -n "${GOMIPS:-}" ]; then env_vars+=("GOMIPS=$GOMIPS"); fi
            build_tags="sing hysteria2 with_quic with_grpc with_utls with_acme"
            if [ "$GOOS" = "linux" ]; then
              build_tags="$build_tags xray with_wireguard with_gvisor"
            fi
            env "${env_vars[@]}" go build -trimpath -tags "$build_tags" \
              -ldflags "-s -w -X github.com/InazumaV/V2bX/cmd.version=${VERSION}" -o "$out_path" .
            pkg_dir="dist/package/${friendly}"
            rm -rf "$pkg_dir"
            mkdir -p "$pkg_dir"
            pkg_bin_name="V2bX${ext}"
            cp "$out_path" "$pkg_dir/$pkg_bin_name"
            if [ -d "example" ]; then
              cp -a "example/." "$pkg_dir/"
            fi
            if [ "$GOOS" = "windows" ]; then
              (cd "$pkg_dir" && zip -q -9 "../../archives/${out_name}.zip" ./*)
            else
              tar -C "$pkg_dir" -czf "dist/archives/${out_name}.tar.gz" .
            fi
          done

      - name: Restore ownership
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          if command -v sudo >/dev/null 2>&1; then
            sudo chown -R "$(id -u):$(id -g)" "${GITHUB_WORKSPACE}/checkout" || true
          fi

      - name: Cleanup per-run Go temp dirs
        if: always()
        working-directory: ${{ github.workspace }}
        run: rm -rf "_tmp/v2bx-go-cache/${GITHUB_RUN_ID}"

      - uses: actions/upload-artifact@v4
        with:
          name: release-arm
          path: checkout/dist/archives/
          if-no-files-found: error

  release:
    needs: [build-x86, build-arm]
    runs-on: [self-hosted, Linux, X64]
    env:
      TAG: ${{ needs.build-x86.outputs.tag }}
    defaults:
      run:
        working-directory: checkout
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          path: checkout

      - uses: actions/download-artifact@v4
        with:
          name: release-x86
          path: ${{ github.workspace }}/_artifacts/x86

      - uses: actions/download-artifact@v4
        with:
          name: release-arm
          path: ${{ github.workspace }}/_artifacts/arm

      - name: Merge artifacts for release
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          rm -rf checkout/dist/archives
          mkdir -p checkout/dist/archives
          shopt -s nullglob
          cp _artifacts/x86/* checkout/dist/archives/ 2>/dev/null || true
          cp _artifacts/arm/* checkout/dist/archives/
          echo "Merged archives:"; ls -la checkout/dist/archives/

      - name: Create and push version tag
        run: |
          set -euo pipefail
          TAG="${TAG:?missing tag from build-x86}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "Remote tag ${TAG} exists; skip"
          else
            git tag -a "${TAG}" -m "Release ${TAG}" "${GITHUB_SHA}"
            git push origin "refs/tags/${TAG}"
          fi

      # softprops 只会「追加」Release 资源；重跑 workflow 会在同一 Release 上堆多次上传
      - name: Delete existing V2bX assets on this tag (GitHub API)
        env:
          TAG: ${{ needs.build-x86.outputs.tag }}
          GITHUB_TOKEN: ${{ github.token }}
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          python3 << 'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request
          from urllib.parse import quote

          repo = os.environ["GITHUB_REPOSITORY"]
          tag = os.environ["TAG"]
          token = os.environ["GITHUB_TOKEN"]
          url = f"https://api.github.com/repos/{repo}/releases/tags/{quote(tag)}"
          req = urllib.request.Request(
              url,
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          try:
              with urllib.request.urlopen(req) as resp:
                  data = json.load(resp)
          except urllib.error.HTTPError as e:
              if e.code == 404:
                  print("No release yet for tag; skip asset delete", file=sys.stderr)
                  sys.exit(0)
              raise

          for asset in data.get("assets", []):
              name = asset.get("name") or ""
              aid = asset.get("id")
              if not name.startswith("V2bX") or aid is None:
                  continue
              del_url = f"https://api.github.com/repos/{repo}/releases/assets/{aid}"
              dreq = urllib.request.Request(
                  del_url,
                  method="DELETE",
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(dreq) as _:
                  pass
              print(f"Removed release asset: {name}", file=sys.stderr)
          PY

      - name: Create/Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: |
            checkout/dist/archives/*
